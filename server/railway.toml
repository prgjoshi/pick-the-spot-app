[build]
builder = "nixpacks"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
# These are set in Railway's dashboard — never commit actual values.
# PORT is injected automatically by Railway.
# Required:  DATABASE_URL, JWT_SECRET, GOOGLE_PLACES_API_KEY, FRONTEND_URL
# Optional:  REDIS_URL, JWT_EXPIRES_IN, LOG_LEVEL, NODE_ENV
